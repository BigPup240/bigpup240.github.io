<!-- Script for Sidebar, Tabs, Accordions, Progress bars and slideshows -->
<script>
// Side navigation
function w3_open() {
  var x = document.getElementById("mySidebar");
  x.style.width = "100%";
  x.style.fontSize = "40px";
  x.style.paddingTop = "10%";
  x.style.display = "block";
}
function w3_close() {
  document.getElementById("mySidebar").style.display = "none";
}

// Accordions
function myAccFunc(id) {
  var x = document.getElementById(id);
  if (x.className.indexOf("w3-show") == -1) {
    x.className += " w3-show";
  } else { 
    x.className = x.className.replace(" w3-show", "");
  }
}

// Progress Bars
function move() {
  var elem = document.getElementById("myBar");   
  var width = 5;
  var id = setInterval(frame, 10);
  function frame() {
    if (width == 100) {
      clearInterval(id);
    } else {
      width++; 
      elem.style.width = width + '%'; 
      elem.innerHTML = width * 1  + '%';
    }
  }
}

var numQuestions = document.getElementsByName("survey-question").length
function updateBar() {
  var barElem = document.getElementById("myBar");  
  
  var numAnswered = 0
  for(var i=1; i<=numQuestions; i++) {
    var radioElem = document.getElementsByName("param" + i)
    console.log(radioElem)
    for (var j = 0; j < radioElem.length; j++) {
      if (radioElem[j].checked) {
        numAnswered++;
        break;
      }
    }
  }
  
  barElem.style.width = numAnswered/numQuestions*100 + '%'; 
  barElem.innerHTML = numAnswered/numQuestions*100  + '%';
}

</script>
